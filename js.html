<script>

let books = [];
let currentPage = 1;
const itemsPerPage = 10; // ✅ ganti sesuai kebutuhan

window.onload = () => {
  loadBooks();
  loadSummary();
};

function loadBooks(){
  google.script.run
    .withSuccessHandler(data => {
      books = data;
      currentPage = 1;
      renderTable(data);
    })
    .getBooks();
}

function loadSummary(){
  google.script.run
    .withSuccessHandler(data => {
      document.getElementById("totalBuku").innerText = data.total;
      document.getElementById("dipinjam").innerText  = data.dipinjam;
      document.getElementById("tersedia").innerText  = data.tersedia;
    })
    .getSummary();
}

function renderTable(data){

  const totalPages = Math.ceil(data.length / itemsPerPage);
  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * itemsPerPage;
  const slice = data.slice(start, start + itemsPerPage);

  const tbody = document.getElementById("bookTable");
  tbody.innerHTML = "";

  if (slice.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">
          Tidak ada buku ditemukan
        </td>
      </tr>`;
  } else {
    slice.forEach(book => {
      tbody.innerHTML += `
        <tr>
          <td data-label="ID">
            <span class="badge-id">${book.id}</span>
          </td>
          <td data-label="Judul" style="font-weight:500;">${book.judul}</td>
          <td data-label="Penulis" style="color:#666;">${book.penulis}</td>
          <td data-label="Kategori">
            <span class="badge-kategori">${book.kategori}</span>
          </td>
          <td data-label="Stok" class="${book.stokTersedia > 0 ? 'stok-ok' : 'stok-habis'}">
            ${book.stokTersedia > 0 ? book.stokTersedia : '● Habis'}
          </td>
          <td data-label="Aksi">
            ${book.stokTersedia > 0
              ? `<button class="pinjamBtn" onclick="showPinjam('${book.id}')">+ Pinjam</button>`
              : `<span class="stok-habis">Tidak tersedia</span>`
            }
          </td>
        </tr>`;
    });
  }

  renderPagination(data.length, totalPages);
}

function renderPagination(totalItems, totalPages){

  const container = document.getElementById("pagination");
  container.innerHTML = "";

  if (totalPages <= 1) return;

  const info = document.createElement("span");
  info.className = "text-sm text-gray-500 mr-3";
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end   = Math.min(currentPage * itemsPerPage, totalItems);
  info.innerText = `${start}–${end} dari ${totalItems} buku`;
  container.appendChild(info);

  // Tombol Prev
  const prev = document.createElement("button");
  prev.innerHTML = "‹";
  prev.className = `px-3 py-1 rounded border text-sm mr-1 ${
    currentPage === 1
    ? "text-gray-300 cursor-not-allowed"
    : "hover:bg-gray-100"
  }`;
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderTable(getFilteredBooks()); };
  container.appendChild(prev);

  // Nomor halaman — tampilkan max 5 halaman di sekitar currentPage
  const range = getPageRange(currentPage, totalPages);
  range.forEach(p => {

    if (p === "...") {
      const dots = document.createElement("span");
      dots.className = "px-2 py-1 text-gray-400 text-sm";
      dots.innerText = "...";
      container.appendChild(dots);
      return;
    }

    const btn = document.createElement("button");
    btn.innerText = p;
    btn.className = `px-3 py-1 rounded border text-sm mr-1 ${
      p === currentPage
      ? "bg-green-700 text-white border-green-700"
      : "hover:bg-gray-100"
    }`;
    btn.onclick = () => { currentPage = p; renderTable(getFilteredBooks()); };
    container.appendChild(btn);

  });

  // Tombol Next
  const next = document.createElement("button");
  next.innerHTML = "›";
  next.className = `px-3 py-1 rounded border text-sm ${
    currentPage === totalPages
    ? "text-gray-300 cursor-not-allowed"
    : "hover:bg-gray-100"
  }`;
  next.disabled = currentPage === totalPages;
  next.onclick = () => { currentPage++; renderTable(getFilteredBooks()); };
  container.appendChild(next);

}

// Buat range halaman seperti: 1 ... 4 5 6 ... 10
function getPageRange(current, total){
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);

  if (current <= 4)  return [1, 2, 3, 4, 5, "...", total];
  if (current >= total - 3) return [1, "...", total-4, total-3, total-2, total-1, total];

  return [1, "...", current-1, current, current+1, "...", total];
}

// Ambil data yang sedang difilter (untuk pagination saat search aktif)
function getFilteredBooks(){
  const keyword = document.getElementById("search").value.toLowerCase();
  if (!keyword) return books;
  return books.filter(book =>
    book.judul.toLowerCase().includes(keyword)   ||
    book.penulis.toLowerCase().includes(keyword) ||
    String(book.id).toLowerCase().includes(keyword)
  );
}

document.getElementById("search").addEventListener("keyup", function(){
  currentPage = 1; // ✅ reset ke halaman 1 setiap kali search
  renderTable(getFilteredBooks());
});

// --- Modal & Submit (tidak berubah) ---

function showPinjam(id){
  document.getElementById("pinjamBookId").value = id;
  document.getElementById("pinjamModal").style.display = "flex";
}

function closePinjamModal(){
  document.getElementById("pinjamModal").style.display = "none";
}

function openKembaliModal(){
  document.getElementById("kembaliModal").style.display = "flex";
}

function closeKembaliModal(){
  document.getElementById("kembaliModal").style.display = "none";
}

function submitPinjam(){

  const btn = document.querySelector('#pinjamModal .btn-success');
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="animate-spin h-4 w-4 inline mr-1" viewBox="0 0 24 24" fill="none">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
      <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    Memproses...
  `;

  const data = {
    nama:   document.getElementById("nama").value,
    divisi: document.getElementById("divisi").value,
    hp:     document.getElementById("hp").value,
    email:  document.getElementById("email").value,
    idBuku: document.getElementById("pinjamBookId").value
  };

  google.script.run
    .withSuccessHandler(res => {
      btn.innerHTML = `✅ Berhasil!`;
      setTimeout(() => {
        alert(res.message);
        closePinjamModal();
        loadBooks();
        loadSummary();
        btn.disabled = false;
        btn.innerHTML = "Pinjam Buku";
      }, 800);
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.innerHTML = "Pinjam Buku";
      alert("Gagal: " + err.message);
    })
    .pinjamBuku(data);
}

function submitKembali(){

  const btn = document.querySelector('#kembaliModal .btn-primary');  // ✅ fix selector
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="animate-spin h-4 w-4 inline mr-1" viewBox="0 0 24 24" fill="none">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
      <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    Memproses...
  `;

  const data = {
    idPinjam: document.getElementById("idPinjam").value,
    email:    document.getElementById("emailKembali").value
  };

  google.script.run
    .withSuccessHandler(res => {
      btn.innerHTML = `✅ Berhasil!`;
      setTimeout(() => {
        alert(res.message);
        closeKembaliModal();
        loadBooks();
        loadSummary();
        btn.disabled = false;
        btn.innerHTML = "Kembalikan";
      }, 800);
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.innerHTML = "Kembalikan";
      alert("Gagal: " + err.message);
    })
    .kembalikanBuku(data);
}

</script>
